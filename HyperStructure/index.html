<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">

    <title>HyperStructure</title>
    <link rel="stylesheet" href="cssPrototypes.css">
    <style>
        body,
        html {
            margin: 0px;
            padding: 0px;
            font-family: Courier new, monospace;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            -khtml-user-select: none;
            -moz-user-select: moz-none;
            -ms-user-select: none;
            user-select: none;
            background: #ccc;
            overflow-y: auto;
        }

        #myProgress {
            width: 100%;
            background-color: #e02929;
        }

        #myBar {
            width: 100%;
            height: 30px;
            background-color: #04aa6d;
            text-align: center;
            line-height: 30px;
            color: #944444;
        }

        #Science {
            width: 100%;
        }

        .grid-container {
            border: 5px solid red;
            border-color: #5013c3;
        }

        .grid-item {
            border: 5px solid red;
            border-color: #45c313;
        }

        .wrapper {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            grid-auto-rows: minmax(100px, auto);
            border: 5px solid red;
            border-color: red;
        }

        #Base {
            position: relative;
            color: blue;
            width: 50%;
            margin: auto;
        }

        #firstRow {
            position: relative !important;
            color: blue !important;
            display: flex !important;
            flex-direction: row !important;
            justify-content: center !important;
        }

        #secondRow {
            position: relative !important;
            color: blue !important;
            display: flex !important;
            flex-direction: row !important;
            justify-content: space-between !important;
        }

        #thirdRow {
            position: relative !important;
            color: blue !important;
            display: flex !important;
            flex-direction: row !important;
            justify-content: center !important;
        }

        .item {
            /* Misc */
            border: 1px solid #cbd5e0;
            height: 100px;
            width: 100px;
            background-color: red;
        }

        #baseSelector {
            /* Misc */
            border: 1px solid #cbd5e0;
            height: 100px;
            width: 100px;
            background-color: rgb(45, 201, 10);
        }
    </style>
</head>
